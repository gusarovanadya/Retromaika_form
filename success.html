<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата прошла — @retromaika</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080809;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bg::before {
    content: ''; position: absolute; top: -220px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse at 50% 0%, rgba(50,220,130,0.13) 0%, transparent 65%);
  }
  .bg::after {
    content: ''; position: absolute; bottom: -150px; right: -100px; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(130,60,255,0.06) 0%, transparent 65%);
  }

  .card {
    position: relative; z-index: 1; width: 100%; max-width: 420px;
    background: rgba(10,10,13,0.97); border: 1px solid rgba(255,255,255,0.09);
    border-radius: 28px; padding: 52px 38px 44px;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 0 0 0.5px rgba(255,255,255,0.04) inset, 0 32px 80px rgba(0,0,0,0.7);
    text-align: center;
    animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .card { animation: none; } }
  .card::before {
    content: ''; position: absolute; top: 0; left: 10%; width: 80%; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(50,220,130,0.55) 40%, rgba(80,180,255,0.35) 60%, transparent 100%);
    border-radius: 999px;
  }

  .icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(50,220,130,0.12); border: 1px solid rgba(50,220,130,0.25);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  .icon svg { width: 28px; height: 28px; stroke: rgba(50,220,130,0.95); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  h1 { font-size: 1.6rem; font-weight: 700; color: #fff; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 10px; }
  p { font-size: 0.88rem; color: rgba(255,255,255,0.45); line-height: 1.55; margin-bottom: 32px; }
  .handle { color: rgba(50,220,130,0.85); font-weight: 500; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8); text-decoration: none;
    border-radius: 12px; padding: 12px 22px;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); color: #fff; }
  .btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  @media (max-width: 460px) { .card { padding: 40px 22px 36px; border-radius: 22px; } h1 { font-size: 1.35rem; } }
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Оплата прошла!</h1>
  <p>Ваш заказ принят. Мы свяжемся с вами в ближайшее время.<br><span class="handle">@retromaika</span> — спасибо за покупку.</p>
  <a href="/" class="btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    На главную
  </a>
</div>
</body>
</html>
