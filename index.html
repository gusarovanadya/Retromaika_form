<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Supabase Debug</title>
<style>body{font-family:monospace;background:#111;color:#0f0;padding:20px}
pre{background:#000;padding:12px;border-radius:6px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.ok{color:#4ade80}.err{color:#f87171}.warn{color:#fbbf24}
button{background:#333;color:#fff;border:none;padding:8px 16px;cursor:pointer;margin:4px;border-radius:4px}
button:hover{background:#555}h2{color:#fff;margin:16px 0 8px}</style>
</head><body>
<h2>🔍 Supabase Diagnostic</h2>
<div id="out"></div>
<script>
var SB='https://lthjzbuupouutqxhcgyl.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0aGp6YnV1cG91dXRxeGhjZ3lsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTY0OTEsImV4cCI6MjA5MzE5MjQ5MX0.y0u4Ep3Hk3lQXnUcQJ77pDY93iZeDD1iVKRoGKOPeSw';

var out = document.getElementById('out');

function log(msg, cls) {
  var p = document.createElement('pre');
  p.className = cls||'';
  p.textContent = msg;
  out.appendChild(p);
}

async function test(table, params) {
  var url = SB+'/rest/v1/'+table+'?'+(params||'limit=3');
  log('GET '+url, 'warn');
  try {
    var r = await fetch(url, {
      headers: {
        'apikey': KEY,
        'Authorization': 'Bearer '+KEY,
        'Accept': 'application/json'
      }
    });
    var body = await r.text();
    if(r.ok) {
      var data = JSON.parse(body);
      log('✓ HTTP '+r.status+' | rows: '+data.length+'\n'+JSON.stringify(data.slice(0,2),null,2), 'ok');
    } else {
      log('✗ HTTP '+r.status+'\n'+body, 'err');
    }
  } catch(e) {
    log('✗ FETCH ERROR: '+e.message, 'err');
  }
}

async function runAll() {
  out.innerHTML = '';
  log('=== Testing Supabase connection ===', 'warn');
  log('URL: '+SB, 'warn');
  log('KEY: '+KEY.slice(0,40)+'...', 'warn');
  log('', '');
  
  await test('products', 'limit=3&order=created_at.desc');
  log('---','warn');
  await test('products', 'limit=3&status=neq.draft&order=created_at.desc');
  log('---','warn');
  await test('publications', 'limit=3&order=published_at.desc');
  log('---','warn');
  await test('reviews', 'limit=3&order=created_at.desc');
  log('---','warn');
  await test('forum_messages', 'limit=3&order=created_at.asc');
  log('=== Done ===', 'warn');
}

runAll();
</script>
</body></html>
