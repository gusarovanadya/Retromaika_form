<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата не прошла — @retromaika</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080809;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bg::before {
    content: ''; position: absolute; top: -220px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,70,70,0.08) 0%, transparent 65%);
  }
  .bg::after {
    content: ''; position: absolute; bottom: -150px; right: -100px; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(130,60,255,0.06) 0%, transparent 65%);
  }

  .card {
    position: relative; z-index: 1; width: 100%; max-width: 420px;
    background: rgba(10,10,13,0.97); border: 1px solid rgba(255,255,255,0.09);
    border-radius: 28px; padding: 52px 38px 44px;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 0 0 0.5px rgba(255,255,255,0.04) inset, 0 32px 80px rgba(0,0,0,0.7);
    text-align: center;
    animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .card { animation: none; } }
  .card::before {
    content: ''; position: absolute; top: 0; left: 10%; width: 80%; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,100,100,0.4) 40%, rgba(255,150,80,0.25) 60%, transparent 100%);
    border-radius: 999px;
  }

  .icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,70,70,0.1); border: 1px solid rgba(255,70,70,0.22);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  .icon svg { width: 26px; height: 26px; stroke: rgba(255,100,100,0.9); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  h1 { font-size: 1.6rem; font-weight: 700; color: #fff; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 10px; }
  p { font-size: 0.88rem; color: rgba(255,255,255,0.45); line-height: 1.55; margin-bottom: 32px; }
  .handle { color: rgba(50,220,130,0.85); font-weight: 500; }

  .btn-group { display: flex; flex-direction: column; gap: 10px; }

  .btn-primary {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    background: #fff; color: #080809; text-decoration: none;
    border-radius: 12px; padding: 13px 22px;
    font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 600;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .btn-primary:hover { background: #F2F2F2; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .btn-primary svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  .btn-secondary {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6); text-decoration: none;
    border-radius: 12px; padding: 12px 22px;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); color: #fff; }
  .btn-secondary svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  @media (max-width: 460px) { .card { padding: 40px 22px 36px; border-radius: 22px; } h1 { font-size: 1.35rem; } }
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </div>
  <h1>Оплата не прошла</h1>
  <p>Что-то пошло не так. Вернитесь и попробуйте ещё раз — заявка сохранена.<br><span class="handle">@retromaika</span></p>
  <div class="btn-group">
    <a href="javascript:history.back()" class="btn-primary">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Попробовать снова
    </a>
    <a href="/" class="btn-secondary">
      <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><polyline points="9 21 9 12 15 12 15 21"/></svg>
      На главную
    </a>
  </div>
</div>
</body>
</html>
